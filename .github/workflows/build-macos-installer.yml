name: Build macOS Installer

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: macos-installer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos-arm64:
    name: Build macOS arm64 DMG
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify arm64 runner
        run: |
          test "$(uname -m)" = "arm64"
          rustc -vV

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: sidecar/uv.lock

      - name: Install frontend dependencies
        run: npm ci

      - name: Build macOS installer
        run: npm run tauri:build:macos

      - name: List installer artifact
        run: ls -lh src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: CogniOS-macos-arm64-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 14
